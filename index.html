<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Huckepack</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      html {
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
    <script>
      // Apply theme immediately to prevent flash of incorrect theme
      (function () {
        // Read from the Zustand persisted store
        const persistedStore = localStorage.getItem("application-theme-store");
        let savedTheme = null;

        if (persistedStore) {
          try {
            const parsed = JSON.parse(persistedStore);
            savedTheme = parsed.state?.themeMode;
          } catch (e) {
            // Fallback to default behavior if parsing fails
          }
        }

        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const shouldBeDark =
          savedTheme === "dark" || (!savedTheme && prefersDark);

        if (shouldBeDark) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        } else {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
